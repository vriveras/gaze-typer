name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/blink-gaze-typer-xwtmi6]
  workflow_dispatch:

# Allow this workflow to enable Pages and publish to it.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site lives at the repo root.
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
